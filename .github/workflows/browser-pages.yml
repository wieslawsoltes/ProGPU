name: Browser Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Publish browser sample with WebAssembly AOT
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore WebAssembly workload
        run: dotnet workload restore src/ProGPU.Samples.Browser/ProGPU.Samples.Browser.csproj

      - name: Restore browser sample
        run: dotnet restore src/ProGPU.Samples.Browser/ProGPU.Samples.Browser.csproj --runtime browser-wasm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Publish AOT browser sample
        run: >-
          dotnet publish src/ProGPU.Samples.Browser/ProGPU.Samples.Browser.csproj
          --configuration Release
          --runtime browser-wasm
          --no-restore
          --output artifacts/browser-aot
          -p:ContinuousIntegrationBuild=true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/browser-aot/wwwroot

  deploy:
    name: Deploy browser sample to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
