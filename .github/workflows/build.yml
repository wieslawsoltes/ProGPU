name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            native_output: src/ProGPU.Tests/bin/Release/net10.0/linux-x64
          - os: macos-26
            rid: osx-arm64
            native_output: src/ProGPU.Tests/bin/Release/net10.0/osx-arm64
          - os: windows-latest
            rid: win-x64
            native_output: src/ProGPU.Tests/bin/Release/net10.0/win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux WebGPU dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan1 \
            mesa-vulkan-drivers \
            libx11-xcb1 \
            libxcb1 \
            libxcb-randr0 \
            libxcb-render0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-xfixes0 \
            libxcb-present0 \
            libxkbcommon0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: |
          dotnet restore src/ProGPU.Tests/ProGPU.Tests.csproj --runtime ${{ matrix.rid }}
          dotnet restore src/ProGPU.Tests.Headless/ProGPU.Tests.Headless.csproj --runtime ${{ matrix.rid }}

      - name: Build tests
        run: |
          dotnet build src/ProGPU.Tests/ProGPU.Tests.csproj --configuration Release --runtime ${{ matrix.rid }} --no-restore -p:ContinuousIntegrationBuild=true
          dotnet build src/ProGPU.Tests.Headless/ProGPU.Tests.Headless.csproj --configuration Release --runtime ${{ matrix.rid }} --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test
        shell: pwsh
        run: |
          $nativeRoot = Join-Path $env:GITHUB_WORKSPACE "${{ matrix.native_output }}"
          $nativeRidRoot = Join-Path $nativeRoot "runtimes/${{ matrix.rid }}/native"
          $headlessNativeRoot = Join-Path $env:GITHUB_WORKSPACE "src/ProGPU.Tests.Headless/bin/Release/net10.0/${{ matrix.rid }}"
          $headlessNativeRidRoot = Join-Path $headlessNativeRoot "runtimes/${{ matrix.rid }}/native"
          if ($IsWindows) {
            $env:PATH = "$nativeRoot;$nativeRidRoot;$headlessNativeRoot;$headlessNativeRidRoot;$env:PATH"
          } elseif ($IsMacOS) {
            $env:DYLD_LIBRARY_PATH = "$nativeRoot`:$nativeRidRoot`:$headlessNativeRoot`:$headlessNativeRidRoot`:$env:DYLD_LIBRARY_PATH"
          } else {
            $env:LD_LIBRARY_PATH = "$nativeRoot`:$nativeRidRoot`:$headlessNativeRoot`:$headlessNativeRidRoot`:$env:LD_LIBRARY_PATH"
          }

          $testArgs = @(
            "test",
            "src/ProGPU.Tests/ProGPU.Tests.csproj",
            "--configuration",
            "Release",
            "--runtime",
            "${{ matrix.rid }}",
            "--no-build",
            "--verbosity",
            "normal"
          )

          if ($IsWindows) {
            # Keep the complete GPU shaping contract on a hosted hardware API.
            # The macOS 26 Metal compiler rejects the historical contextual
            # entry point, while the Windows D3D12 lane can validate it in an
            # isolated process before the lifetime-bounded core selection.
            $shapingArgs = $testArgs + @(
              "--filter",
              "FullyQualifiedName~ShapingContractsTests"
            )

            dotnet @shapingArgs
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            $testArgs += @(
              "--filter",
              "FullyQualifiedName~DiagnosticsLoggingSourceTests|FullyQualifiedName~StrongNameSigningTests|FullyQualifiedName~WindowsDpiAwarenessTests"
            )
          } elseif ($IsMacOS) {
            # macOS 26's hosted Metal compiler rejects the historical contextual
            # OpenType entry point even when its WGSL is restored byte-for-byte.
            # Keep all other core and headless macOS coverage; the complete GPU
            # shaping contract runs above on the isolated Windows D3D12 process.
            $testArgs += @(
              "--filter",
              "FullyQualifiedName!~ShapingContractsTests"
            )
          } elseif ($IsLinux) {
            # The shaping contract suite repeatedly initializes and dispatches GPU
            # pipelines; under Mesa software execution it dominates this lane. The
            # complete suite remains covered by the macOS hardware-GPU lane, while
            # Linux keeps the remaining core tests and all headless render coverage.
            $testArgs += @(
              "--filter",
              "FullyQualifiedName!~ShapingContractsTests"
            )
          }

          dotnet @testArgs
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $headlessArgs = @(
            "test",
            "src/ProGPU.Tests.Headless/ProGPU.Tests.Headless.csproj",
            "--configuration",
            "Release",
            "--runtime",
            "${{ matrix.rid }}",
            "--no-build",
            "--verbosity",
            "normal"
          )

          if ($IsWindows) {
            # Keep native WebGPU lifetime bounded on the hosted Windows runner.
            # Sample pages share one retained headless device, while ordinary headless,
            # image effects, ShaderToy, and the large multilingual specimen each get a
            # fresh process. Image effects creates the largest transient texture graph.
            $headlessArgs += @(
              "--filter",
              "FullyQualifiedName!~SamplePagesTests"
            )
          }

          dotnet @headlessArgs
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          if ($IsWindows) {
            dotnet test `
              src/ProGPU.Tests.Headless/ProGPU.Tests.Headless.csproj `
              --configuration Release `
              --runtime "${{ matrix.rid }}" `
              --no-build `
              --verbosity normal `
              --filter "FullyQualifiedName~SamplePagesTests&FullyQualifiedName!~ShaderToy&FullyQualifiedName!~ImageEffects&FullyQualifiedName!~Test_TypographyScriptsPage_Renders"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            dotnet test `
              src/ProGPU.Tests.Headless/ProGPU.Tests.Headless.csproj `
              --configuration Release `
              --runtime "${{ matrix.rid }}" `
              --no-build `
              --verbosity normal `
              --filter "FullyQualifiedName~SamplePagesTests.Test_ImageEffectsPage_Renders"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            dotnet test `
              src/ProGPU.Tests.Headless/ProGPU.Tests.Headless.csproj `
              --configuration Release `
              --runtime "${{ matrix.rid }}" `
              --no-build `
              --verbosity normal `
              --filter "FullyQualifiedName~SamplePagesTests&FullyQualifiedName~ShaderToy"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            dotnet test `
              src/ProGPU.Tests.Headless/ProGPU.Tests.Headless.csproj `
              --configuration Release `
              --runtime "${{ matrix.rid }}" `
              --no-build `
              --verbosity normal `
              --filter "FullyQualifiedName=ProGPU.Tests.Headless.SamplePagesTests.Test_TypographyScriptsPage_Renders"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

  pack:
    name: Pack shipping packages
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Pack shipping packages
        shell: bash
        run: PROGPU_PACKAGE_VERSION=0.1.0-ci.${{ github.run_number }} ./eng/progpu-pack.sh

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: progpu-packages-linux-x64
          path: |
            artifacts/packages/Release/*.nupkg
            artifacts/packages/Release/*.snupkg
          if-no-files-found: error
